; ============================================================================
;  odoo.conf — конфигурација за Odoo ERP серверот во Docker
; ============================================================================
[options]
; Главен сервисен линк кон PostgreSQL контејнерот
db_host = odoo-db
db_port = 5432
db_user = odoo
db_password = odoo_pw
; Не пишувај db_name тука — нека биде False за прв boot, така Odoo ќе
; прикаже database manager и ќе креира база со исто име преку UI-то.
; Откако базата ќе биде иницијализирана (модулот base инсталиран), ова може
; да се промени во db_name = odoo за авто-конект.
db_name = False
db_template = template1

; Максимален број на worker-и (CPU bound)
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200
max_cron_threads = 2
workers = 4

; Листа на дополнителни addons (нашиот /mnt/extra-addons mount)
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; XML-RPC (надворешен API) е овозможен
xmlrpc = True
xmlrpc_interface =
xmlrpc_port = 8069

; Longpolling за chat / bus
longpolling_port = 8072

; Логирање
log_level = info
log_handler = :INFO

; Сигурносна конфигурација
list_db = True
proxy_mode = True

; Демо податоци (false за продукција)
demo = {}

; Модули кои автоматски се инсталираат при прво стартување
data_dir = /var/lib/odoo

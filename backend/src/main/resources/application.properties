spring.application.name=portal

# ===== Odoo XML-RPC bridge =============================================
# Конфигурација за OdooClient. Сите вредности се пренесуваат преку
# Docker Compose environment variables (види docker-compose.yml).
odoo.url=${ODOO_URL:http://localhost:8069/xmlrpc/2}
odoo.db=${ODOO_DB:odoo}
odoo.user=${ODOO_USER:admin}
odoo.password=${ODOO_PASSWORD:admin}

# ===== H2 in-memory datasource (за аналитички цели и seed) ============
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:socdb}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate DDL Auto & SQL Logging
spring.jpa.hibernate.ddl-auto=update
spring.show-sql=true

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Port
server.port=8080

# Defer datasource initialization to run data.sql after table creation
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
